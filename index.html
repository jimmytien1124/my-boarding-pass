<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boarding Pass</title>

<style>
* { box-sizing: border-box; }

:root {
  --bg: #06070a;
  --text: #f5f7ff;
  --cyan: #00eaff;
  --red: #ff4d6d;
  --purple: rgba(180,120,255,0.2);
}

/* ===== BODY ===== */
body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Arial, sans-serif;
  text-align: center;
  overflow-y: auto;
}

/* ===== CONTAINER ===== */
.container {
  max-width: 420px;
  margin: auto;
  padding: 30px 16px 100px;
}

/* ===== PAGE ===== */
.page {
  display: none;
  border: 1px solid var(--purple);
  border-radius: 20px;
  padding: 16px;
}

.page.active {
  display: block;
}

/* ===== BUTTON ===== */
button {
  border: 2px solid var(--cyan);
  background: transparent;
  color: var(--cyan);
  padding: 12px 20px;
  border-radius: 999px;
  margin-top: 20px;
}

/* ===== WARNING ===== */
.warning {
  border: 2px solid var(--red);
  box-shadow: 0 0 20px rgba(255,0,0,0.4);
  padding: 20px;
}

/* ===== TYPEWRITER ===== */
#typewriter {
  line-height: 2;
  font-size: 18px;
}

/* ===== GLITCH（重點） ===== */
.glitch {
  position: relative;
}

.glitch::before,
.glitch::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
  top: 0;
  opacity: 0.15;
}

.glitch::before {
  color: #00eaff;
  animation: glitch1 3s infinite;
}

.glitch::after {
  color: #ff4d6d;
  animation: glitch2 3s infinite;
}

@keyframes glitch1 {
  0%, 97%, 100% { transform: none; }
  98% { transform: translate(-1px, 0); }
  99% { transform: translate(1px, 0); }
}

@keyframes glitch2 {
  0%, 97%, 100% { transform: none; }
  98% { transform: translate(1px, 0); }
  99% { transform: translate(-1px, 0); }
}

/* ===== FINAL GLOW ===== */
.final-glow {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(circle, rgba(0,234,255,0.08), transparent 60%);
  opacity: 0;
  transition: 1s;
}

.final-glow.active {
  opacity: 1;
}

/* ===== BUTTON GROUP ===== */
#buttons {
  display: none;
  margin-top: 30px;
}

.choice {
  margin: 5px;
}

/* ===== SUCCESS ===== */
#success {
  opacity: 0;
  transform: scale(0.9);
  transition: 0.8s;
}

#success.active {
  opacity: 1;
  transform: scale(1);
}
</style>
</head>

<body>

<div class="container">

<!-- STEP 1 -->
<div id="step1" class="page active">
  <h3>BOARDING PASS</h3>
  <p>FROM: OUR STORY</p>
  <p>TO: THE NEXT CHAPTER</p>
  <p>FLIGHT: AI143</p>
  <button onclick="nextStep(2)">SCAN TO BOARD</button>
</div>

<!-- STEP 2 -->
<div id="step2" class="page">
  <div class="warning">
    <h2>WARNING</h2>
    <p>ONE WAY TICKET</p>
    <button onclick="startFinal()">CONFIRM</button>
  </div>
</div>

<!-- STEP 3 -->
<div id="step3" class="page">
  <div id="typewriter" class="glitch" data-text=""></div>

  <div id="buttons">
    <button class="choice" onclick="nextStep(4)">Accept</button>
    <button class="choice">Gift Notice</button>
    <button class="choice" onclick="nextStep(4)">Accept</button>
  </div>
</div>

<!-- STEP 4 -->
<div id="step4" class="page">
  <div id="success">
    <h1>BOARDING CONFIRMED</h1>
    ❤️
  </div>
</div>

</div>

<div class="final-glow" id="glow"></div>

<script>
const text = `Dear Most Precious Passenger Yudai:

Before boarding,
we have prepared a special gift for you.

It will stay by your side.

Because—

it has always been here.

Now,
please look to your left.

Your gift is right here.`;

let i = 0;

function nextStep(n){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("step"+n).classList.add("active");
}

function startFinal(){
  nextStep(3);
  i = 0;
  document.getElementById("typewriter").innerHTML = "";
  type();
}

function type(){
  if(i < text.length){
    let char = text[i];
    let el = document.getElementById("typewriter");

    el.innerHTML += char === "\n" ? "<br>" : char;
    el.setAttribute("data-text", el.innerText);

    i++;
    setTimeout(type, 40);
  } else {
    setTimeout(()=>{
      document.getElementById("buttons").style.display = "block";
      document.getElementById("glow").classList.add("active");
    },600);
  }
}

document.querySelectorAll(".choice").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    nextStep(4);
    setTimeout(()=>{
      document.getElementById("success").classList.add("active");
    },50);
  });
});
</script>

</body>
</html>
