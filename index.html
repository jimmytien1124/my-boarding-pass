<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boarding Pass</title>

<style>
body {
    margin:0;
    background:#0f0f10;
    color:#fff;
    font-family:"Microsoft JhengHei";
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.container { width:90%; max-width:400px; }

#boardingCard {
    background:#f8f8f8;
    color:#333;
    border-radius:16px;
    padding:18px;
    max-width:360px;
    margin:auto;
}

.ticket-header {
    display:flex;
    justify-content:space-between;
    font-size:0.7rem;
}

.class-tag {
    color:#d4af37;
    font-weight:bold;
}

.location-info {
    font-size:2rem;
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}

#startBtn {
    margin-top:15px;
    margin-bottom:40px;
    border:2px solid #fff;
    background:none;
    color:#fff;
    padding:12px 25px;
    border-radius:30px;
}

#warningBox {
    display:none;
    background:#1f1f1f;
    padding:30px;
    border-radius:15px;
    border:2px solid #ff4d4d;
}

.confirm-btn {
    margin-top:20px;
    background:#ff4d4d;
    border:none;
    padding:10px 20px;
    color:white;
    border-radius:8px;
}

#lineContainer { display:none; }

.line {
    margin:12px 0;
    font-size:1.1rem;
    line-height:1.7;
    opacity:0;
    transform:translateY(10px);
    animation:fadeUp 1s forwards;
}

.line:nth-child(1){animation-delay:0.5s;}
.line:nth-child(2){animation-delay:1.5s;}
.line:nth-child(3){animation-delay:2.5s;}
.line:nth-child(4){animation-delay:3.5s;}
.line:nth-child(5){animation-delay:4.5s;}

@keyframes fadeUp {
    to { opacity:1; transform:translateY(0); }
}

.highlight {
    color:#fff;
    text-shadow:0 0 12px rgba(255,80,80,0.6);
}

.sub {
    display:block;
    font-size:0.9rem;
    opacity:0.7;
}

#finalButtons {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:20px;
    opacity:0;
    transition:0.5s;
}

#finalButtons.show { opacity:1; }

.choice-btn {
    border:2px solid #fff;
    background:none;
    color:#fff;
    padding:10px 20px;
    border-radius:30px;
}

.hint {
    font-size:0.7rem;
    opacity:0.6;
    align-self:center;
}

#noticePage {
    display:none;
}

#successPage {
    display:none;
    font-size:1.5rem;
}

</style>
</head>

<body>

<div class="container">

<!-- 第一頁 -->
<div id="step1">
    <div id="boardingCard">
        <div class="ticket-header">
            <span>PRIVATE FLIGHT</span>
            <span class="class-tag">FIRST CLASS • ONE SEAT ONLY</span>
        </div>

        <div class="location-info">
            <span>TPE</span>
            <span>✈</span>
            <span>YES</span>
        </div>
    </div>

    <button id="startBtn">SCAN TO BOARD</button>
</div>

<!-- 第二頁 -->
<div id="warningBox">
    <h3>⚠️ ONE WAY TICKET</h3>
    <p>
    本航班為單程票<br>
    一旦登機，無法返回
    </p>
    <button class="confirm-btn" id="confirm">確認登機</button>
</div>

<!-- 第三頁 -->
<div id="lineContainer">
    <div class="line">致 最特別的旅客 Yudai：</div>
    <div class="line">航班資訊如下——</div>

    <div class="line highlight">
        出發日期：2025 / 10 / 30
        <span class="sub">那一天，我們初次相遇</span>
    </div>

    <div class="line">
        目的地：有你在的每一天<br>
        票種：單程
    </div>

    <div class="line">
        這不是一時衝動<br>
        是我想很久的答案
    </div>

    <div class="line">
        Yudai，你願意和我在一起嗎？
    </div>

    <div id="finalButtons">
        <button class="choice-btn yes">Yes</button>
        <div class="hint">旅客須知</div>
        <button class="choice-btn yes">Yes</button>
    </div>
</div>

<!-- 說明頁 -->
<div id="noticePage">
    <p>
    本航班為單程<br>
    目的地：有你在的每一天<br>
    僅接受 Yes 作為回覆
    </p>
    <button id="backBtn">返回</button>
</div>

<!-- 成功頁 -->
<div id="successPage">
    BOARDING CONFIRMED ❤️
</div>

</div>

<script>

const step1 = document.getElementById("step1");
const warning = document.getElementById("warningBox");
const lines = document.getElementById("lineContainer");
const buttons = document.getElementById("finalButtons");
const notice = document.getElementById("noticePage");
const success = document.getElementById("successPage");

document.getElementById("startBtn").onclick = ()=>{
    step1.style.display="none";
    warning.style.display="block";
}

document.getElementById("confirm").onclick = ()=>{
    warning.style.display="none";
    lines.style.display="block";

    setTimeout(()=>{
        buttons.classList.add("show");
    },5000);
}

document.querySelector(".hint").onclick = ()=>{
    lines.style.display="none";
    notice.style.display="block";
}

document.getElementById("backBtn").onclick = ()=>{
    notice.style.display="none";
    lines.style.display="block";
}

document.querySelectorAll(".yes").forEach(btn=>{
    btn.onclick=()=>{
        lines.style.display="none";
        success.style.display="block";
    }
});

</script>

</body>
</html>
