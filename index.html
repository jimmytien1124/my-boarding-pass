<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Boarding Pass - YUDAI</title>
  <style>
    :root {
      --bg: #06070a;
      --text: #f5f7ff;
      --cyan: #00eaff;
      --red: #ff4d6d;
      --gold: #c7a43a;
      --purple-glow: rgba(180, 120, 255, 0.15);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 50% 15%, rgba(0, 234, 255, 0.05), transparent 40%), var(--bg);
      color: var(--text);
      font-family: "Inter", "Helvetica Neue", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: flex-start; 
      overflow-x: hidden;
      overflow-y: auto;
      padding: 40px 0;
    }

    /* 星空 */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star { position: absolute; background: white; border-radius: 50%; animation: twinkle var(--d) infinite; opacity: 0; }
    @keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: 0.6; } }

    .main-container {
      width: 90%; max-width: 400px; position: relative; z-index: 10;
      border: 1px solid rgba(180, 120, 255, 0.2); border-radius: 28px;
      padding: 30px 20px; background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px);
      box-shadow: 0 0 40px var(--purple-glow);
      transition: transform 0.6s cubic-bezier(0.19, 1, 0.22, 1);
    }

    .crt-off { animation: crtClose 0.6s forwards ease-in; }
    @keyframes crtClose {
      0% { transform: scale(1, 1); opacity: 1; }
      50% { transform: scale(1, 0.005); opacity: 0.8; }
      100% { transform: scale(0, 0); opacity: 0; }
    }

    .page { display: none; text-align: center; }
    .page.active { display: block; animation: fadeIn 0.8s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* 登機證反光 */
    .ticket {
      background: #e8e9eb; color: #1a1a1a; border-radius: 16px; padding: 24px;
      text-align: left; position: relative; overflow: hidden; margin-bottom: 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }
    .ticket::after {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(135deg, transparent 45%, rgba(0,234,255,0.08) 50%, transparent 55%);
      background-size: 200% 200%; animation: ticketShine 6s infinite;
      pointer-events: none;
    }
    @keyframes ticketShine {
      0% { background-position: 200% 200%; }
      100% { background-position: -200% -200%; }
    }

    .ticket-head { display: flex; justify-content: space-between; font-size: 0.75rem; font-weight: 700; margin-bottom: 15px; border-bottom: 1px solid #ccc; padding-bottom: 10px; }
    .t-label { font-size: 0.65rem; color: #777; text-transform: uppercase; margin-bottom: 2px; }
    .t-value { font-size: 1.05rem; font-weight: 800; color: #111; margin-bottom: 12px; }

    /* 按鈕樣式 */
    button {
      appearance: none; border: none; border-radius: 999px;
      font-size: 0.8rem; cursor: pointer; font-family: inherit;
      position: relative; overflow: hidden; color: #fff;
      background: rgba(255,255,255,0.05); backdrop-filter: blur(6px);
      transition: all 0.25s ease;
    }
    button span { position: relative; z-index: 2; }
    button::before {
      content: ""; position: absolute; inset: 0; border-radius: 999px; padding: 1.5px;
      background: linear-gradient(120deg, transparent, var(--cyan), transparent);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor; mask-composite: exclude; opacity: 0.6;
    }

    /* 第三頁按鈕排版：中間大旁邊小 */
    #btnGroup {
      display: flex; justify-content: center; align-items: center; gap: 10px;
      opacity: 0; transition: 1s; margin-top: 25px; width: 100%;
    }
    #btnGroup button { padding: 12px 5px; white-space: nowrap; flex: 1.2; font-size: 0.75rem; }
    #btnGroup button.danger-btn { flex: 2; font-size: 0.85rem; padding: 14px 10px; border: 1px solid rgba(255,77,109,0.4); }
    #btnGroup button.danger-btn::before { background: linear-gradient(120deg, transparent, var(--red), transparent); }

    /* 心電圖優化 */
    .heart-monitor { width: 100%; margin-top: 40px; }
    .ekg-base { stroke: rgba(0, 234, 255, 0.08); stroke-width: 2.5; fill: none; }
    .ekg-active {
      stroke: var(--cyan); stroke-width: 3; fill: none;
      stroke-dasharray: 80, 1000;
      filter: drop-shadow(0 0 12px var(--cyan)) drop-shadow(0 0 4px var(--cyan));
      animation: ekgMove 2.5s linear infinite;
    }
    @keyframes ekgMove { 0% { stroke-dashoffset: 1080; } 100% { stroke-dashoffset: 0; } }

    #typewriter { text-align: left; min-height: 240px; line-height: 1.8; font-size: 1rem; }
    #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; }
    .p-bar-fill { height: 100%; background: var(--cyan); width: 0%; box-shadow: 0 0 10px var(--cyan); }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div id="loader">
    <div style="width:40px; height:40px; border:3px solid rgba(255,255,255,0.1); border-top-color:var(--cyan); border-radius:50%; animation:spin 1s infinite linear;"></div>
    <div style="width:180px; height:2px; background:rgba(255,255,255,0.1); margin:20px 0 8px;"><div class="p-bar-fill" id="pFill"></div></div>
    <div id="pPercent" style="font-size: 0.8rem; color: var(--cyan); font-family: monospace;">0%</div>
  </div>

  <div class="main-container" id="mainFrame">
    
    <div id="page1" class="page active">
      <div class="ticket">
        <div class="ticket-head">
          <span>AIR NEW ZEALAND<br>TRAVELER: YUDAI</span>
          <span style="text-align:right;"><span style="color:var(--gold)">FIRST CLASS</span><br>1A | AI143</span>
        </div>
        <div class="t-label">FROM</div><div class="t-value">OUR STORY</div>
        <div class="t-label">TO</div><div class="t-value">THE NEXT CHAPTER</div>
        <div style="display:flex; justify-content: space-between;">
          <div><div class="t-label">DATE</div><div class="t-value">2025/10/30</div></div>
          <div><div class="t-label">STATUS</div><div class="t-value">CLEARED</div></div>
          <div style="text-align:right;"><div class="t-label">TYPE</div><div class="t-value">ONE WAY</div></div>
        </div>
      </div>
      <button style="padding: 14px 28px;" onclick="runLoading()"><span>SCAN TO BOARD</span></button>
    </div>

    <div id="page3" class="page">
      <div id="typewriter"></div>
      <div id="btnGroup">
        <button onclick="transit('pageFinal')"><span>Accept</span></button>
        <button class="danger-btn" onclick="transit('pageNotice')"><span>Gift Notice</span></button>
        <button onclick="transit('pageFinal')"><span>Accept</span></button>
      </div>
    </div>

    <div id="pageFinal" class="page">
      <h2 style="letter-spacing: 6px;">BOARDING CONFIRMED</h2>
      <p style="opacity:0.6; font-size: 0.85rem;">It was never a new journey.<br>It just finally began.</p>
      <svg class="heart-monitor" viewBox="0 0 600 160">
        <path class="ekg-base" d="M0 80 L150 80 L170 40 L190 120 L210 60 L230 80 L280 80 C280 50, 320 50, 320 80 C320 50, 360 50, 360 80 L600 80" />
        <path class="ekg-active" d="M0 80 L150 80 L170 40 L190 120 L210 60 L230 80 L280 80 C280 50, 320 50, 320 80 C320 50, 360 50, 360 80 L600 80" />
      </svg>
    </div>

  </div>

  <script>
    const sC = document.getElementById('stars');
    if (sC) {
      for(let i=0; i<40; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.width = s.style.height = (Math.random() * 2 + 1) + 'px';
        s.style.setProperty('--d', (Math.random() * 3 + 2) + 's');
        s.appendChild(s); sC.appendChild(s);
      }
    }

    function runLoading() {
      document.getElementById('loader').style.display = 'flex';
      let p = 0;
      const inv = setInterval(() => {
        p += Math.floor(Math.random() * 5) + 2;
        if(p >= 100) { p = 100; clearInterval(inv); setTimeout(() => { document.getElementById('loader').style.display='none'; transit('page3', startTypewriter); }, 400); }
        document.getElementById('pFill').style.width = p + '%';
        document.getElementById('pPercent').innerText = p + '%';
      }, 50);
    }

    function transit(nextId, cb) {
      document.getElementById('mainFrame').classList.add('crt-off');
      setTimeout(() => {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(nextId).classList.add('active');
        document.getElementById('mainFrame').classList.remove('crt-off');
        if(cb) cb();
      }, 600);
    }

    function startTypewriter() {
      const box = document.getElementById('typewriter');
      const lines = ["Dear Yudai:", "This is a gift from my heart.", "Please look to your left."];
      box.innerHTML = "";
      let lIdx = 0;
      function type() {
        if(lIdx < lines.length) {
          let div = document.createElement('div'); box.appendChild(div);
          let cIdx = 0;
          function char() {
            if(cIdx < lines[lIdx].length) { div.innerHTML += lines[lIdx][cIdx++]; setTimeout(char, 50); }
            else { lIdx++; setTimeout(type, 500); }
          }
          char();
        } else { document.getElementById('btnGroup').style.opacity = "1"; }
      }
      type();
    }
  </script>
</body>
</html>
