<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Boarding Pass</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #06070a;
      --text: #f5f7ff;
      --ticket-bg: #f2f2f2;
      --ticket-text: #171717;
      --cyan: #00eaff;
      --red: #ff4d6d;
      --purple: rgba(180, 120, 255, 0.4);
    }

    body {
      margin: 0; min-height: 100vh;
      background: radial-gradient(circle at 50% 15%, rgba(0, 234, 255, 0.05), transparent 28%), var(--bg);
      color: var(--text); font-family: "Helvetica Neue", Arial, sans-serif;
      text-align: center; padding: 16px; overflow-x: hidden;
    }

    .container { width: 100%; max-width: 420px; margin: 0 auto; padding-top: 36px; padding-bottom: 120px; }

    .page {
      display: none; border: 1px solid var(--purple); border-radius: 24px;
      box-shadow: 0 0 32px rgba(180, 120, 255, 0.16); padding: 18px 14px 22px;
      background: rgba(255,255,255,0.01); backdrop-filter: blur(1px);
    }
    .page.active { display: block; }

    /* 機票與按鈕基本樣式 */
    .ticket {
      position: relative; overflow: hidden; background: var(--ticket-bg); color: var(--ticket-text);
      border-radius: 22px; padding: 20px; text-align: left; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
    }
    .divider { height: 1px; background: #cfcfcf; margin: 14px 0; }
    button {
      appearance: none; border: 2px solid var(--cyan); background: transparent; color: var(--cyan);
      padding: 13px 26px; border-radius: 999px; font-size: 0.98rem; cursor: pointer; margin-top: 22px;
    }

    /* --- 彈出式載入視窗 (Loading Modal) --- */
    #loadingModal {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
      z-index: 10000; display: none; justify-content: center; align-items: center;
      backdrop-filter: blur(4px);
    }

    .modal-content {
      width: 85%; max-width: 300px; background: #111; border: 1px solid var(--cyan);
      border-radius: 20px; padding: 30px 20px; box-shadow: 0 0 20px rgba(0, 234, 255, 0.2);
      text-align: center;
    }

    /* 轉圈圈 */
    .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(0, 234, 255, 0.1);
      border-top: 3px solid var(--cyan); border-radius: 50%;
      margin: 0 auto 20px; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-title { color: var(--cyan); font-size: 0.9rem; letter-spacing: 2px; margin-bottom: 15px; }

    /* 進度條容器 */
    .progress-container {
      display: flex; align-items: center; gap: 10px; width: 100%;
    }
    .progress-bg {
      flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;
    }
    .progress-bar {
      width: 0%; height: 100%; background: var(--cyan);
      box-shadow: 0 0 10px var(--cyan); transition: width 0.1s linear;
    }
    .progress-percent { color: var(--cyan); font-family: monospace; font-size: 0.85rem; min-width: 35px; }

    /* 心電圖無限循環 */
    .heartbeat-line {
      fill: none; stroke: var(--cyan); stroke-width: 4;
      stroke-dasharray: 600, 600; stroke-dashoffset: 1200;
      animation: drawingHeartbeat 3s linear forwards, loopHeartbeat 2.5s linear infinite 3s;
    }
    @keyframes drawingHeartbeat { to { stroke-dashoffset: 600; } }
    @keyframes loopHeartbeat { from { stroke-dashoffset: 600; } to { stroke-dashoffset: 0; } }

    #typewriter { line-height: 2; min-height: 100px; }
  </style>
</head>
<body>

  <div id="loadingModal">
    <div class="modal-content">
      <div class="spinner"></div>
      <div class="loading-title" id="loadingText">PROCESSING...</div>
      <div class="progress-container">
        <div class="progress-bg">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="progress-percent" id="progressPercent">0%</div>
      </div>
    </div>
  </div>

  <div class="container">
    <div id="step1" class="page active">
      <div class="ticket">
        <div>AIR NEW ZEALAND<br>TRAVELER: YUDAI</div>
        <div class="divider"></div>
        <div style="font-size: 0.72rem; color: #777;">FROM</div><div>OUR STORY</div>
        <div style="font-size: 0.72rem; color: #777;">TO</div><div>THE NEXT CHAPTER</div>
      </div>
      <button onclick="startLoading('step2')">SCAN TO BOARD</button>
    </div>

    <div id="step2" class="page">
      <h2 style="color:var(--red)">ONE WAY TICKET</h2>
      <p>Confirm boarding? There is no return.</p>
      <button onclick="startLoading('step3', startTypewriter)">CONFIRM</button>
    </div>

    <div id="step3" class="page">
      <div id="typewriter"></div>
      <div id="buttons" style="display:none; gap:10px; justify-content:center; margin-top:20px;">
        <button onclick="startLoading('step4', finishAction)">Accept</button>
      </div>
    </div>

    <div id="step4" class="page">
      <h2>BOARDING CONFIRMED</h2>
      <svg viewBox="0 0 600 140" style="width:100%; margin-top:20px;">
        <path class="heartbeat-line" d="M20 90 L110 90 L145 90 L165 50 L185 120 L205 65 L225 90 L255 90 L270 90 C282 68, 308 60, 325 78 C342 60, 368 68, 380 90 C380 112, 355 126, 325 145 C295 126, 270 112, 270 90 L395 90 L425 90 L445 55 L465 118 L485 72 L505 90 L580 90" />
      </svg>
    </div>
  </div>

  <script>
    const FINAL_TEXT = `Dear Yudai:\n\nBefore boarding, we have prepared a special gift for you.\n\nIf you are willing to accept it, it will stay by your side.\n\nNow, please look to your left.`;

    function startLoading(nextPageId, callback) {
      const modal = document.getElementById('loadingModal');
      const bar = document.getElementById('progressBar');
      const percentText = document.getElementById('progressPercent');
      const loadingText = document.getElementById('loadingText');
      
      const phrases = ["SYNCHRONIZING...", "AUTHORIZING...", "DECRYPTING...", "FINALIZING..."];
      loadingText.innerText = phrases[Math.floor(Math.random() * phrases.length)];

      modal.style.display = 'flex';
      let progress = 0;
      bar.style.width = '0%';
      percentText.innerText = '0%';

      // 1.5秒跑完進度條 (每 15ms 跑 1%)
      const interval = setInterval(() => {
        progress += 2; // 每次增加 2%
        if (progress > 100) progress = 100;
        
        bar.style.width = progress + '%';
        percentText.innerText = progress + '%';

        if (progress >= 100) {
          clearInterval(interval);
          setTimeout(() => {
            modal.style.display = 'none';
            showPage(nextPageId);
            if (callback) callback();
          }, 200); // 滿格後停一下下再消失
        }
      }, 30); // 1.5秒總共 1500ms / (100%/2%) = 30ms 
    }

    function showPage(id) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function startTypewriter() {
      const box = document.getElementById('typewriter');
      const btns = document.getElementById('buttons');
      box.innerHTML = ""; btns.style.display = "none";
      let i = 0;
      function type() {
        if (i < FINAL_TEXT.length) {
          let c = FINAL_TEXT.charAt(i);
          box.innerHTML += c === "\n" ? "<br>" : c;
          i++; setTimeout(type, 50);
        } else { btns.style.display = "flex"; }
      }
      type();
    }

    function finishAction() {
      // 可以在這裡加煙火或其他效果
    }
  </script>
</body>
</html>
