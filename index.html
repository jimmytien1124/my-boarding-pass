<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boarding</title>

<style>
body{
  margin:0;
  background:#06070a;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

.page{
  display:none;
  padding:20px;
}

.active{display:block;}

button{
  margin-top:20px;
  padding:12px 24px;
  border-radius:999px;
  border:2px solid #00eaff;
  color:#00eaff;
  background:none;
  position:relative;
  overflow:hidden;
}

/* 🔵 藍掃描 */
.scan-btn::after{
  content:"";
  position:absolute;
  top:10%;
  bottom:10%;
  width:4px;
  left:10%;
  background:linear-gradient(to bottom,
    transparent, #00eaff, transparent);
  animation:scan 2s infinite alternate;
}

/* 🔴 紅掃描 */
.danger-btn{
  border-color:#ff4d6d;
  color:#ff4d6d;
}
.danger-btn::after{
  content:"";
  position:absolute;
  top:10%;
  bottom:10%;
  width:4px;
  left:10%;
  background:linear-gradient(to bottom,
    transparent, #ff4d6d, transparent);
  animation:scan 2s infinite alternate;
}

@keyframes scan{
  0%{left:10%;}
  100%{left:90%;}
}

/* CRT */
#tv{
  position:fixed;
  inset:0;
  background:black;
  opacity:0;
}

.tv{
  animation:tv 0.6s forwards;
}

@keyframes tv{
  0%{transform:scaleY(1);}
  70%{transform:scaleY(0.05);}
  100%{transform:scaleY(0);}
}

/* notice */
.notice-list{
  text-align:left;
  font-family:monospace;
}
.notice-list li{
  margin:10px 0;
}
</style>
</head>

<body>

<div id="p1" class="page active">
  <h2>BOARDING PASS</h2>
  <button id="start" class="scan-btn">SCAN TO BOARD</button>
</div>

<div id="p2" class="page">
  <h2>WARNING</h2>
  ONE WAY TICKET
  <br>
  <button id="confirm" class="scan-btn">CONFIRM</button>
</div>

<div id="p3" class="page">
  <div id="text"></div>

  <div id="btns" style="display:none;">
    <button class="scan-btn yes">Accept</button>
    <button id="notice" class="danger-btn">Gift Notice</button>
    <button class="scan-btn yes">Accept</button>
  </div>
</div>

<div id="pNotice" class="page">
  <ul class="notice-list">
    <li>This gift is one-way and non-returnable.</li>
    <li>It may not always be perfect but sincere.</li>
    <li>Honesty is required even when it hurts.</li>
    <li>Replies shouldn't take too long.</li>
    <li>Photos are appreciated 😉</li>
  </ul>
  <button id="back" class="scan-btn">Back</button>
</div>

<div id="p4" class="page">
  <h1>❤️ BOARDING CONFIRMED ❤️</h1>
</div>

<div id="tv"></div>

<script>
document.addEventListener("DOMContentLoaded",()=>{

let pages=document.querySelectorAll(".page");
let tv=document.getElementById("tv");

function go(id){
  pages.forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function tvGo(id){
  tv.style.opacity=1;
  tv.classList.add("tv");
  setTimeout(()=>{
    tv.classList.remove("tv");
    tv.style.opacity=0;
    go(id);
  },600);
}

/* 打字機 */
let txt=`Your gift is right here.`;
let i=0;

function type(){
  if(i<txt.length){
    document.getElementById("text").innerHTML+=txt[i];
    i++;
    setTimeout(type,40);
  }else{
    document.getElementById("btns").style.display="block";
  }
}

/* 按鈕 */
document.getElementById("start").onclick=()=>tvGo("p2");

document.getElementById("confirm").onclick=()=>{
  tvGo("p3");
  i=0;
  document.getElementById("text").innerHTML="";
  document.getElementById("btns").style.display="none";
  setTimeout(type,500);
};

document.querySelectorAll(".yes").forEach(b=>{
  b.onclick=()=>tvGo("p4");
});

document.getElementById("notice").onclick=()=>tvGo("pNotice");
document.getElementById("back").onclick=()=>tvGo("p3");

});
</script>

</body>
</html>
