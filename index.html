<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Air New Zealand - Digital Boarding Pass</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --text-color: #ffffff;
            --warn-color: #ff4d4d;
        }
        body { margin: 0; background-color: var(--bg-color); color: var(--text-color); font-family: "Microsoft JhengHei", sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; text-align: center; }
        .container { width: 85%; transition: all 0.5s; }
        #startBtn { border: 2px solid var(--text-color); background: transparent; color: var(--text-color); padding: 15px 30px; font-size: 1.1rem; letter-spacing: 2px; cursor: pointer; border-radius: 50px; margin-top: 20px; box-shadow: 0 0 10px rgba(255,255,255,0.3); }
        #warningBox { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #222; border: 2px solid var(--warn-color); padding: 35px 20px; border-radius: 15px; z-index: 100; width: 80%; box-shadow: 0 0 20px rgba(255, 77, 77, 0.6); }
        #warningBox h2 { color: var(--warn-color); margin-top: 0; font-size: 1.5rem; letter-spacing: 1px; }
        #warningBox p { font-size: 1rem; line-height: 1.7; color: #ddd; margin: 25px 0; }
        .confirm-btn { background: var(--warn-color); color: white; border: none; padding: 12px 30px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        #finalContent { display: none; opacity: 0; transition: opacity 2s; width: 90%; max-width: 400px; }
        #typewriter { font-size: 1.2rem; line-height: 2; color: #f0f0f0; white-space: pre-wrap; font-weight: 300; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="step1" class="container">
        <p style="letter-spacing: 4px; opacity: 0.6; font-size: 0.8rem; margin-bottom: 5px;">AIR NEW ZEALAND</p>
        <p style="letter-spacing: 2px; opacity: 0.5; font-size: 0.7rem; margin-top: 0;">Flight A1 14106</p>
        <h2 style="margin-bottom: 35px; margin-top: 30px; font-weight: 400;">FIRST CLASS<br>DIGITAL BOARDING</h2>
        <div style="font-size: 3.5rem; margin-bottom: 30px; opacity: 0.8;">🎫</div>
        <button id="startBtn">[ SCAN TO BOARD ]</button>
    </div>

    <div id="warningBox">
        <h2>⚠️ WARNING:<br>ONE WAY TICKET</h2>
        <p>尊敬的旅客：<br><br>這是一張無法退票的單程機票。<br>一旦確認登機，目的地將只有「我的心」，且無法返回。</p>
        <button class="confirm-btn" id="confirmBoarding">確認登機，我不後悔</button>
    </div>

    <div id="finalContent">
        <div id="typewriter"></div>
    </div>

    <script>
        const loveLetter = "致 最特別的旅客 Yudai：\n\n歡迎登上這班沒有終點的航班。\n\n雖然機票上目的地寫的是 `YES!`，\n但真正的終點，\n是只要有你陪在身邊的任何地方。\n\n我一直 cherish 有你在的日子。\n\n你願意，成為我這輩子的專屬旅伴嗎？ ❤️";
        const startBtn = document.getElementById('startBtn');
        const warningBox = document.getElementById('warningBox');
        const confirmBoarding = document.getElementById('confirmBoarding');
        const step1 = document.getElementById('step1');
        const finalContent = document.getElementById('finalContent');
        const typewriterEl = document.getElementById('typewriter');

        startBtn.onclick = () => {
            step1.style.opacity = '0';
            setTimeout(() => { step1.style.display = 'none'; warningBox.style.display = 'block'; }, 500);
        };

        confirmBoarding.onclick = () => {
            warningBox.style.display = 'none';
            finalContent.style.display = 'block';
            setTimeout(() => { finalContent.style.opacity = '1'; startTyping(); }, 500);
        };

        let i = 0;
        function startTyping() {
            if (i < loveLetter.length) {
                typewriterEl.innerHTML += loveLetter.charAt(i) === '\n' ? '<br>' : loveLetter.charAt(i);
                i++;
                setTimeout(startTyping, 130); 
            }
        }
    </script>
</body>
</html>
